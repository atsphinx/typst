name: 'Release new version'

on:
  push:
    tags:
      - 'v*.*.*'

env:
  UV_NO_SYNC: 1
  TASK_X_REMOTE_TASKFILES: 1

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.59.0
      - name: 'Build package'
        run: |
          uv build
      - uses: actions/upload-artifact@v7
        with:
          name: packages-${{ github.ref_name }}
          path: dist/
  gh-release:
    needs: [build-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: packages-${{ github.ref_name }}
          path: dist/
      - uses: ncipollo/release-action@v1
        with:
          artifacts: 'dist/*'
          bodyFile: '.github/release-body.md'
          draft: false
          name: Release ${{ github.ref_name }}
          tag: ${{ github.ref }}
          prerelease: false
  publish-pypi:
    needs: [build-package]
    runs-on: ubuntu-latest
    environment:
      name: 'pypi'
      url: 'https://pypi.org/p/atsphinx-typst'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: packages-${{ github.ref_name }}
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
  deploy-docs:
    needs: [publish-pypi]
    uses: ./.github/workflows/deploy-docs.yaml
    permissions:
      contents: read
      pages: write
      id-token: write
